services:

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # TODO 6: Исправьте сетевую конфигурацию Kafka
      # Проблема: ADVERTISED_LISTENERS использует localhost:9092
      # Контейнеры (app, ksqldb) не могут подключиться к localhost — это их собственный loopback
      # Решение: настройте два listener-а:
      #   - PLAINTEXT://kafka:29092 (для контейнеров, внутренняя сеть Docker)
      #   - EXTERNAL://localhost:9092 (для хост-машины)
      # Обновите LISTENER_SECURITY_PROTOCOL_MAP, LISTENERS, ADVERTISED_LISTENERS
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: seminar7-kafka-cluster-id-01
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      retries: 5

  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    ports:
      - "8088:8088"
    environment:
      # TODO 7: Измените bootstrap-сервер на внутренний адрес kafka:29092
      KSQL_BOOTSTRAP_SERVERS: localhost:9092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: seminar7-ksql
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
    depends_on:
      kafka:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # TODO 8: Измените bootstrap-сервер на внутренний адрес kafka:29092
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: localhost:9092
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # TODO 9: Измените bootstrap-сервер на внутренний адрес kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
    depends_on:
      kafka:
        condition: service_healthy
